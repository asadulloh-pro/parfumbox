# Parfumbox stack: Postgres + API + Telegram mini app (web) + Admin panel.
# Usage (from repo root): docker compose up --build
#
# URLs (host):
#   API:   http://localhost:3000   (Swagger: http://localhost:3000/docs)
#   Web:   http://localhost:8080
#   Admin: http://localhost:8081
#
# Default admin login (from seed): admin@parfumbox.local / changeme
#
# Optional: copy to .env next to this file and set TELEGRAM_BOT_TOKEN, JWT secrets, etc.

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: parfumbox
    volumes:
      - parfumbox_pg:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    env_file:
      - ./apps/api/.env
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/parfumbox?schema=public
      NODE_ENV: production
      PORT: '3000'
      JWT_SECRET: ${JWT_SECRET:-change-me-user-jwt-docker}
      JWT_EXPIRES_IN: 7d
      ADMIN_JWT_SECRET: ${ADMIN_JWT_SECRET:-change-me-admin-jwt-docker}
      ADMIN_JWT_EXPIRES_IN: 1d
      TELEGRAM_INIT_DATA_MAX_AGE_SEC: '86400'
      CORS_ORIGINS: http://localhost:8080,http://localhost:5173,http://localhost:8081,http://127.0.0.1:8080,http://127.0.0.1:5173,http://127.0.0.1:8081
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    ports:
      - '8080:80'
    depends_on:
      - api

  admin:
    build:
      context: .
      dockerfile: docker/admin/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:3000
    ports:
      - '8081:80'
    depends_on:
      - api

volumes:
  parfumbox_pg:
